name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1개로 제한(중복 실행 시 이전 것 취소)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # 빌드타임에 인라인되는 PUBLIC_* 값을 .env 로 주입합니다.
      #  - SITE_ORIGIN / BASE_PATH 는 repo 좌표에서 자동 도출(소유자/리포지토리명)
      #  - SUPABASE / KAKAO 키는 repo Variables 에서 (Settings > Secrets and variables > Actions > Variables)
      #    anon·JS 키는 어차피 브라우저에 노출되는 공개키라 Variables 로 충분합니다.
      - name: Write .env
        run: |
          {
            echo "PUBLIC_SITE_ORIGIN=https://${{ github.repository_owner }}.github.io"
            echo "PUBLIC_BASE_PATH=/${{ github.event.repository.name }}"
            echo "PUBLIC_SUPABASE_URL=${{ vars.PUBLIC_SUPABASE_URL }}"
            echo "PUBLIC_SUPABASE_ANON_KEY=${{ vars.PUBLIC_SUPABASE_ANON_KEY }}"
            echo "PUBLIC_KAKAO_JS_KEY=${{ vars.PUBLIC_KAKAO_JS_KEY }}"
          } > .env

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
